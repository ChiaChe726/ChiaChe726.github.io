# 自動把網站 build 出來並部署到 GitHub Pages。
# 每次 push 到 main(例如合併 PR)就會自動更新線上網站。
#
# ⚠️ 需要在 GitHub 網頁設定一次:
#    Settings → Pages → Build and deployment → Source 選「GitHub Actions」
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # 也允許在 Actions 頁面手動觸發
  workflow_dispatch:

# 部署到 Pages 需要的權限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一時間只跑一個部署;有新的就排隊,不取消進行中的
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # 1) 把 Docusaurus build 成靜態檔,當成 Pages artifact 上傳
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build website
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: build

  # 2) 部署上傳的 artifact 到 GitHub Pages
  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
